# KubeGenius Helm Chart Values

global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: "gp3"

# Frontend Configuration
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: kubegenius/frontend
    tag: "3.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: kubegenius.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: kubegenius-tls
        hosts:
          - kubegenius.example.com

# Backend API Configuration
backend:
  enabled: true
  replicaCount: 2
  image:
    repository: kubegenius/backend
    tag: "3.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 500m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
      scaleUp:
        stabilizationWindowSeconds: 60
  env:
    AUTOSCALER_ENABLED: "true"
    ML_MODEL_PATH: "/app/models"
    IN_CLUSTER: "true"
    DEBUG: "false"

# ML Engine Configuration
mlEngine:
  enabled: true
  replicaCount: 1
  image:
    repository: kubegenius/ml-engine
    tag: "3.1.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 4Gi
      cpu: 2000m
  persistence:
    enabled: true
    size: 10Gi
    storageClass: "gp3"
  env:
    TRAINING_INTERVAL_HOURS: "6"
    PREDICTION_WINDOW: "30"
    LOOKBACK_WINDOW: "60"

# Autoscaler Configuration
autoscaler:
  enabled: true
  cpuScaleUpThreshold: 75
  cpuScaleDownThreshold: 30
  minReplicas: 1
  maxReplicas: 20
  cooldownSeconds: 300
  aiMode: "hybrid"  # ai_only, reactive_only, hybrid
  confidenceThreshold: 0.85

# ML Configuration
ml:
  lookbackWindow: 60
  forecastHorizon: 30
  retrainIntervalHours: 6
  epochs: 50
  batchSize: 32
  learningRate: 0.001

# Database Configuration
postgresql:
  enabled: true
  auth:
    database: kubegenius
    username: postgres
    password: "change-me"
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "gp3"
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

# Redis Configuration
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: "gp3"
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 200m

# Monitoring Configuration
prometheus:
  enabled: true
  server:
    persistentVolume:
      enabled: true
      size: 50Gi
      storageClass: "gp3"
    retention: "15d"
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 2Gi
        cpu: 1000m

grafana:
  enabled: true
  admin:
    user: admin
    password: admin
  persistence:
    enabled: true
    size: 5Gi
    storageClass: "gp3"
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m
  dashboards:
    enabled: true

# Ingress Configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  hosts:
    - host: kubegenius.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: kubegenius-tls
      hosts:
        - kubegenius.example.com

# Security Configuration
security:
  rbac:
    enabled: true
    serviceAccount:
      name: kubegenius
      automountServiceAccountToken: true

# Alerting Configuration
alerting:
  enabled: true
  slack:
    enabled: false
    webhookUrl: ""
  email:
    enabled: false
    smtpHost: ""
    smtpPort: 587
    username: ""
    password: ""
  pagerduty:
    enabled: false
    integrationKey: ""

# Cost Optimization
cost:
  enabled: true
  idleDetectionInterval: 3600
  savingsThreshold: 10.0
