apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubegenius
  namespace: kubegenius
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubegenius
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "namespaces", "events", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "update", "create"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubegenius
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubegenius
subjects:
  - kind: ServiceAccount
    name: kubegenius
    namespace: kubegenius
---
apiVersion: v1
kind: Secret
metadata:
  name: kubegenius-secrets
  namespace: kubegenius
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://postgres:postgres@postgres.kubegenius:5432/kubegenius"
  redis-url: "redis://redis.kubegenius:6379/0"
  secret-key: "change-me-in-production-kubegenius-secret-key-2024"
  slack-webhook: ""
  alert-email: "admin@kubegenius.ai"
